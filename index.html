<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECCANG WMS API Docs</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #162033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(920px, calc(100% - 40px));
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 700;
    }

    p {
      margin: 0 0 28px;
      color: #516070;
      font-size: 16px;
      line-height: 1.55;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    a {
      display: block;
      padding: 22px;
      border: 1px solid #d9e0eb;
      border-radius: 8px;
      background: #fff;
      color: #1a4f9c;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(16, 32, 54, 0.08);
    }

    a strong {
      display: block;
      margin-bottom: 8px;
      color: #162033;
      font-size: 18px;
    }

    a span {
      color: #516070;
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>ECCANG WMS API Docs</h1>
    <p>Open one of the documentation pages below.</p>
    <div class="links">
      <a href="./wms-api-docs.html">
        <strong>ECCANG WMS API Documentation</strong>
        <span>General WMS API documentation in English.</span>
      </a>
      <a href="./fba-transit-api.html">
        <strong>ECCANG WMS FBA Transit API</strong>
        <span>FBA Transit version API documentation in English.</span>
      </a>
    </div>
  </main>
</body>
</html>
